<svg width="850" height="100" viewBox="0 0 850 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="850" height="100" rx="10" fill="#161b22" stroke="#ffbc42" stroke-width="2"/>
  
  <!-- Quote 1: Luffy -->
  <g opacity="0">
    <text x="50%" y="45%" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#ff5e62" font-style="italic">
      "If you don't take risks, you can't create a future!"
    </text>
    <text x="50%" y="75%" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
      — Monkey D. Luffy
    </text>
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.18;0.20;1" dur="25s" repeatCount="indefinite" />
  </g>

  <!-- Quote 2: Zoro -->
  <g opacity="0">
    <text x="50%" y="45%" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#38bdf8" font-style="italic">
      "When I decided to follow my dream, I had already discarded my life."
    </text>
    <text x="50%" y="75%" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
      — Roronoa Zoro
    </text>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.20;0.22;0.38;0.40;1" dur="25s" repeatCount="indefinite" />
  </g>

  <!-- Quote 3: Sanji -->
  <g opacity="0">
    <text x="50%" y="45%" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#ffbc42" font-style="italic">
      "It doesn't matter who you are, I will never turn away someone who is hungry!"
    </text>
    <text x="50%" y="75%" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
      — Vinsmoke Sanji
    </text>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.40;0.42;0.58;0.60;1" dur="25s" repeatCount="indefinite" />
  </g>

  <!-- Quote 4: Brook -->
  <g opacity="0">
    <text x="50%" y="45%" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#f472b6" font-style="italic">
      "No matter how deep the darkness, the light of dawn will always break through."
    </text>
    <text x="50%" y="75%" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
      — Brook
    </text>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.60;0.62;0.78;0.80;1" dur="25s" repeatCount="indefinite" />
  </g>

  <!-- Quote 5: MLOps -->
  <g opacity="0">
    <text x="50%" y="45%" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="bold" fill="#34d399" font-style="italic">
      "No matter how deep the ocean of data, MLOps will guide the ship to production."
    </text>
    <text x="50%" y="75%" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cbd5e1">
      — MLOps Navigator
    </text>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.80;0.82;0.98;1" dur="25s" repeatCount="indefinite" />
  </g>
</svg>
